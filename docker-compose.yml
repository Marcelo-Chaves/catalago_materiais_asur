services:
  postgres:
    image: postgres:17

    container_name: postgres_catalogo

    restart: always

    environment:
      POSTGRES_DB: catalogo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    api:
build: .

container_name: catalogo_api

restart: always

ports:
  - "3000:3000"

env_file:
  - .env

depends_on:
  - postgres  

volumes:
  postgres_data: